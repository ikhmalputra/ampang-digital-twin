version: '3.8'

services:
  # 1. IoT Message Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ampang-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # 2. Visual IoT Workflow Engine
  nodered:
    image: nodered/node-red:latest
    container_name: ampang-nodered
    ports:
      - "1880:1880"
    volumes:
      - ./docker/nodered/data:/data
    depends_on:
      - mosquitto
    restart: unless-stopped

  # 3. Spatial Database (PostGIS)
  postgis:
    image: postgis/postgis:15-3.3
    container_name: ampang-postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ampang_password
      POSTGRES_DB: ampang_dt
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgis/data:/var/lib/postgresql/data
      - ./docker/postgis/init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  # 4. Vector Tile Server (pg_tileserv)
  pg_tileserv:
    image: pramsey/pg_tileserv
    container_name: ampang-pgtileserv
    environment:
      DATABASE_URL: "postgresql://postgres:ampang_password@postgis:5432/ampang_dt"
    ports:
      - "7800:7800"
    depends_on:
      - postgis
    restart: unless-stopped
